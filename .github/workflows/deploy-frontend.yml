# ── Frontend CI/CD ────────────────────────────────────────────────────────────
#
# Triggered whenever HTML or JS files change on master.
#
# Jobs:
#   1. deploy — upload changed files to Azure Storage ($web container)
#   2. purge  — tell Cloudflare to evict cached copies so visitors
#               see the new version immediately
#
# Secrets required (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS    — Service Principal JSON
#   CLOUDFLARE_API_TOKEN — Cloudflare API token (Zone:Cache Purge permission)
#   CLOUDFLARE_ZONE_ID   — Cloudflare Zone ID for vincentlelaverda.com
#
name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - "index.html"
      - "how-i-was-built.html"
      - "counter.js"

jobs:
  # ── 1. Deploy to Azure Storage ─────────────────────────────────────────────
  deploy:
    name: Upload to Azure Storage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get storage account key
        id: storage-key
        run: |
          KEY=$(az storage account keys list \
            --resource-group rg-cloud-cv \
            --account-name stvincentcv \
            --query "[0].value" -o tsv)
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Upload HTML and JS to $web container
        run: |
          az storage blob upload-batch \
            --account-name stvincentcv \
            --account-key "${{ steps.storage-key.outputs.key }}" \
            --destination '$web' \
            --source . \
            --pattern "*.html" \
            --overwrite true

          az storage blob upload-batch \
            --account-name stvincentcv \
            --account-key "${{ steps.storage-key.outputs.key }}" \
            --destination '$web' \
            --source . \
            --pattern "*.js" \
            --overwrite true

  # ── 2. Purge Cloudflare cache ──────────────────────────────────────────────
  purge-cache:
    name: Purge Cloudflare cache
    runs-on: ubuntu-latest
    needs: deploy       # only purge after upload succeeds

    steps:
      - name: Purge everything
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything": true}' \
            | tee purge-result.json

          # Fail the step if Cloudflare reports an error
          if ! jq -e '.success == true' purge-result.json > /dev/null; then
            echo "::error::Cloudflare cache purge failed"
            cat purge-result.json
            exit 1
          fi

          echo "Cache purged successfully"
